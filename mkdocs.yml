site_name: MageObsidian
site_url: https://mage-obsidian.jeanmarcos.dev/
theme:
  logo: ./assets/tool.png
  favicon: ./assets/tool.png
  language: en
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.annotate
    - content.code.select
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - announce.dismiss
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.progress
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/toggle-switch-off
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to system preference
extra_css:
  - stylesheets/extra.css
copyright: Jeanmarcos Juarez | MageObsidian
plugins:
  - search
  - awesome-pages
  - macros
  - social:
      cards_layout_options:
        background_color: "#5B5BD6"
        color: "#FFFFFF"
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Introduction: Introducción
            Key Features: Características Clave
            Motivation: Motivación
            Getting started: Primeros pasos
            Requirements: Requerimientos
            Installation: Instalación
            Scaffolding: Generadores
            Development: Desarrollo
            Twig Engine: Motor Twig
            Helpers & Filters: Helpers y Filtros
            Configuration: Configuración
            How Contributing?: ¿Cómo contribuir?
            Components: Componentes
            Theme: Tema
            Reference: Referencia
            Supporting the Project: Apoyando el Proyecto
            Compatibility Modules: Módulos Compatibles
            Overview: Resumen
            Home: Inicio
            Theme Overview: Tema
            Compatibility Themes: Temas Compatibles
nav:
  - Home: index.md 
  - Introduction:
    - Motivation: introduction/index.md
    - Key Features: introduction/key-features.md
  - Getting started:
    - Requirements: getting-started/requirements.md
    - Installation: getting-started/installation.md
    - Scaffolding: getting-started/scaffolding.md
    - Development: getting-started/development.md
  - Components:
    - Overview: components/overview.md
    - Installation: components/installation.md
    - Compatibility Modules:
      - ... | flat | components/modules/*.md
    - Compatibility Themes:
      - ... | flat | components/themes/*.md
  - Theme Overview:
    - theme/index.md
  - Twig Engine:
    - Overview: twig/index.md
    - Helpers & Filters: twig/helpers.md
  # - Reference:
  #   - reference/index.md
  - How Contributing?:
    - support/index.md
  - Supporting the Project:
    - support/project.md
extra:
  theme_name: "MageObsidian Theme"
  demo_url: https://mage-obsidian-demo.jeanmarcos.dev/
  gh_theme_default_url: https://github.com/mage-obsidian/theme-default
  gh_theme_base_url: https://github.com/mage-obsidian/theme-base
  gh_storefront_url: https://github.com/mage-obsidian/module-storefront
  gh_main_module_url: https://github.com/mage-obsidian/module-modern-frontend
  gh_main_module_cli_url: https://github.com/mage-obsidian/module-modern-frontend-cli
  gh_vite_url: https://github.com/mage-obsidian/component-modern-frontend
  gh_docs_url: https://github.com/mage-obsidian/obsidian-docs
  gh_js_utils_url: https://github.com/mage-obsidian/js-package-utils
  components_name: "MageObsidian Components"
  discord_link: https://discord.gg/d6nHVw8h
  alternate:
    - name: English
      link: /
      lang: en
    - name: Español
      link: /es/
      lang: es
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: /support/#repositories
    - icon: fontawesome/brands/discord
      link: https://discord.gg/d6nHVw8h
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.keys
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg